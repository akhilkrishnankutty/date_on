spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable Hibernate SQL logging to keep test output clean
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# Dummy JWT Secret for tests
jwt.secret=YTJlOGI0ZjVjNzEyZDM2OWU4YWIxY2Q1ZjA5MTIzNDU2Nzg5MGFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTIz

# Cloudinary Dummy Config (so context loads)
cloudinary.cloud_name=dummy
cloudinary.api_key=dummy
cloudinary.api_secret=dummy

# Disable Kafka listener auto-startup to prevent connection timeouts
spring.kafka.listener.auto-startup=false

